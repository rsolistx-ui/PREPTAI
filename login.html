<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREPT AI — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#07070e;color:#edeaf7;font-family:'Outfit',sans-serif}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:0 32px;height:58px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(7,7,14,0.95);backdrop-filter:blur(20px)}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo-dot{width:7px;height:7px;border-radius:50%;background:#e6c668;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.nav-logo-text{font-size:20px;font-weight:900;color:#e6c668;letter-spacing:-0.5px}
#authOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#07070e;flex-direction:column;align-items:center;justify-content:center;gap:32px}
#authOverlay.show{display:flex!important}
.ov-nav{position:absolute;top:0;left:0;right:0;height:58px;display:flex;align-items:center;padding:0 32px;border-bottom:1px solid rgba(255,255,255,0.06)}
.ov-logo-wrap{display:flex;align-items:center;gap:8px}
.ov-dot{width:7px;height:7px;border-radius:50%;background:#e6c668;animation:pulse 2s ease-in-out infinite}
.ov-logo-text{font-size:20px;font-weight:900;color:#e6c668;letter-spacing:-0.5px}
.ov-spinner{width:38px;height:38px;border:2.5px solid rgba(255,255,255,0.06);border-top-color:#e6c668;border-radius:50%;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-text{font-size:14px;color:#07070e;user-select:none}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 24px 48px}
.card{position:relative;z-index:1;background:#0f0f1c;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:40px;width:100%;max-width:420px}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;margin-bottom:24px}
.tab{flex:1;padding:8px;background:transparent;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.18s}
.tab.on{background:rgba(255,255,255,0.08);color:#edeaf7}
.google-btn{width:100%;padding:12px;background:#fff;color:#1a1a2e;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px)}
.google-icon{width:18px;height:18px;flex-shrink:0}
.apple-btn{width:100%;padding:12px;background:#000;color:#fff;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.apple-btn:hover{background:#1a1a1a;transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;color:rgba(255,255,255,0.2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;color:#edeaf7;outline:none;transition:border 0.2s}
.form-group input:focus{border-color:rgba(123,109,244,0.4)}
.submit-btn{width:100%;padding:12px;background:linear-gradient(135deg,#e6c668,#c8a84b);color:#07070e;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:4px}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px)}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.msg.success{background:rgba(69,222,122,0.1);border:1px solid rgba(69,222,122,0.2);color:#45de7a}
.free-note{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;margin-top:12px;line-height:1.6}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:#8c89a6}
.back-link a{color:rgba(255,255,255,0.3);text-decoration:none}
.back-link a:hover{color:#e6c668}
.loading{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,0.2);border-top-color:#07070e;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px}
.loading-white{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px}
</style>
</head>
<body>

<div id="authOverlay">
  <div class="ov-nav">
    <div class="ov-logo-wrap">
      <div class="ov-dot"></div>
      <div class="ov-logo-text">PREPT AI</div>
    </div>
  </div>
  <div class="ov-spinner"></div>
  <div class="ov-text">.</div>
</div>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-dot"></div>
    <span class="nav-logo-text">PREPT AI</span>
  </a>
</nav>

<div class="page">
<div class="card">
  <div class="tabs">
    <button class="tab on" id="tabLogin" onclick="switchTab('login')">Log in</button>
    <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign up free</button>
  </div>
  <button class="apple-btn" onclick="document.getElementById('loginEmail').focus()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.39c1.4.07 2.38.74 3.2.8 1.22-.24 2.39-.93 3.68-.84 1.58.13 2.77.74 3.54 1.9-3.26 1.95-2.49 5.88.48 7.07-.57 1.52-1.32 3.02-2.9 4.96zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
    Continue with Apple
  </button>
  <button class="google-btn" id="googleBtn" onclick="handleGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
  <div class="divider">or continue with email</div>
  <div id="loginForm">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@email.com" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Log in →</button>
    <div class="msg" id="loginMsg"></div>
  </div>
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signupEmail" placeholder="you@email.com" onkeydown="if(event.key==='Enter')handleSignup()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password (min 8 characters)" onkeydown="if(event.key==='Enter')handleSignup()"/>
    </div>
    <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Create free account →</button>
    <div class="msg" id="signupMsg"></div>
    <div class="free-note">Free account includes 3 interview questions and 1 resume analysis.<br>Upgrade to Pro anytime for unlimited access.</div>
  </div>
  <div class="back-link">
    <a href="/">← Back to preptai.co</a>
    &nbsp;·&nbsp;
    <a href="https://billing.stripe.com/p/login/bJe4gAdlkddX92gfLycbC00" target="_blank">Manage billing</a>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://lfxfwhitegsjeowlcvqk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeGZ3aGl0ZWdzamVvd2xjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODM3ODMsImV4cCI6MjA4OTg1OTc4M30.f67zZLrSbaLbTgWZtvx2AIr4aCGVRxuynEFm1_CKvWs';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function switchTab(t) {
  document.getElementById('loginForm').style.display  = t==='login'  ? 'block':'none';
  document.getElementById('signupForm').style.display = t==='signup' ? 'block':'none';
  document.getElementById('tabLogin').classList.toggle('on',  t==='login');
  document.getElementById('tabSignup').classList.toggle('on', t==='signup');
}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';}

async function handleGoogle() {
  const btn=document.getElementById('googleBtn');
  const overlay=document.getElementById('authOverlay');
  btn.disabled=true;
  btn.innerHTML='<span class="loading-white"></span>Connecting...';
  btn.style.background='#333';btn.style.color='#fff';
  const resetBtn=()=>{
    btn.disabled=false;btn.style.background='#fff';btn.style.color='#1a1a2e';
    btn.innerHTML=`<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google`;
    if(overlay)overlay.classList.remove('show');
  };
  try {
    const {data,error}=await db.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/prept_v2.html'}});
    if(error){resetBtn();showMsg('loginMsg','Google sign in failed: '+error.message,'error');return;}
    if(overlay)overlay.classList.add('show');
    if(data?.url)setTimeout(()=>{window.location.href=data.url;},60);
  } catch(e){resetBtn();showMsg('loginMsg','Something went wrong: '+e.message,'error');}
}

async function handleLogin() {
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password){showMsg('loginMsg','Please enter your email and password.','error');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<span class="loading"></span>Logging in...';
  const {data,error}=await db.auth.signInWithPassword({email,password});
  if(error){btn.disabled=false;btn.innerHTML='Log in →';showMsg('loginMsg','Incorrect email or password.','error');return;}
  sessionStorage.setItem('preptai_user',JSON.stringify({email,plan:'free'}));
  showMsg('loginMsg','Logged in! Redirecting...','success');
  setTimeout(()=>{window.location.href='/prept_v2.html';},800);
}

async function handleSignup() {
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!email||!password){showMsg('signupMsg','Please fill in all fields.','error');return;}
  if(password.length<8){showMsg('signupMsg','Password must be at least 8 characters.','error');return;}
  const btn=document.getElementById('signupBtn');
  btn.disabled=true;btn.innerHTML='<span class="loading"></span>Creating account...';
  const {data,error}=await db.auth.signUp({email,password});
  if(error){btn.disabled=false;btn.innerHTML='Create free account →';showMsg('signupMsg',error.message||'Something went wrong.','error');return;}
  sessionStorage.setItem('preptai_user',JSON.stringify({email,plan:'free'}));
  showMsg('signupMsg','Account created! Welcome to PREPT AI. Redirecting...','success');
  setTimeout(()=>{window.location.href='/prept_v2.html';},1000);
}
</script>
</body>
</html>
